---
version: 2
updates:
  - package-ecosystem: npm
    directory: /ha_codex_ui/backend
    schedule:
      interval: weekly
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: npm
    directory: /ha_codex_ui/frontend
    schedule:
      interval: weekly
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: docker
    directory: /ha_codex_ui
    schedule:
      interval: weekly
