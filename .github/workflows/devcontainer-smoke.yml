---
name: Devcontainer Smoke

on:
  workflow_call:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: devcontainer-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  devcontainer:
    runs-on: ubuntu-latest
    env:
      HA_INSTANCE_URL: ${{ secrets.HA_INSTANCE_URL }}
      HA_TOKEN: ${{ secrets.HA_TOKEN }}
      HA_REPO_URL: https://github.com/resace3/HA_Codex_UI
      HA_ADDON_SLUG: ha_codex_ui
    steps:
      - uses: actions/checkout@v7
      - name: Build and run devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            bash scripts/ci-all.sh
            bash .devcontainer/smoke-install-addon.sh
            bash .devcontainer/start-home-assistant.sh
      - name: Summary
        if: always()
        run: |
          echo "### Devcontainer smoke" >> "$GITHUB_STEP_SUMMARY"
          echo "Built the HA_Codex_UI devcontainer and attempted CI," >> "$GITHUB_STEP_SUMMARY"
          echo "add-on detection, Docker, and Home Assistant diagnostics where supported." >> "$GITHUB_STEP_SUMMARY"
