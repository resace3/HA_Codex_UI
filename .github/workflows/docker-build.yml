---
name: Docker Build

on:
  workflow_call:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      SMOKE_IMAGE_TAG: ghcr.io/resace3/ha-codex-ui:ci
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build amd64 image
        run: |
          docker buildx build --load --platform linux/amd64 \
            --build-arg CODEX_STUB=1 \
            -t ${{ env.SMOKE_IMAGE_TAG }} \
            -f ha_codex_ui/Dockerfile ha_codex_ui
      - name: Docker smoke
        env:
          SMOKE_IMAGE_TAG: ${{ env.SMOKE_IMAGE_TAG }}
          SMOKE_SKIP_BUILD: 1
        run: bash scripts/smoke-docker-image.sh
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.SMOKE_IMAGE_TAG }}
          format: sarif
          output: trivy-image.sarif
          version: v0.72.0
      - uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-image.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: trivy-image.sarif
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-sarif
          path: trivy-image.sarif
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-smoke-logs
          path: /tmp/ha-codex-ui-*/container.log
          if-no-files-found: ignore
