---
name: Browser Rendering

on:
  workflow_call:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: browser-rendering-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser:
    runs-on: ubuntu-latest
    env:
      CODEX_STUB: "1"
      HA_CODEX_UI_DIRECT_ACCESS: "1"
      HA_CODEX_UI_FRONTEND_DIR: "/tmp/ha-codex-ui-e2e/frontend"
      PORT: "8107"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install backend
        working-directory: ha_codex_ui/backend
        run: |
          npm install --package-lock-only
          npm ci
          npm run build
      - name: Install frontend and browsers
        working-directory: ha_codex_ui/frontend
        run: |
          npm install --package-lock-only
          npm ci
          npm run build
          npx playwright install --with-deps chromium webkit
      - name: Prepare runtime fixtures
        run: |
          mkdir -p /tmp/ha-codex-ui-e2e/data /tmp/ha-codex-ui-e2e/share/ha_codex_ui_workspace /tmp/ha-codex-ui-e2e/share/ha_codex_ui_uploads
          cp -R ha_codex_ui/frontend/dist /tmp/ha-codex-ui-e2e/frontend
          cat > /tmp/ha-codex-ui-e2e/options.json <<JSON
          {
            "default_workspace": "/tmp/ha-codex-ui-e2e/share/ha_codex_ui_workspace",
            "upload_workspace": "/tmp/ha-codex-ui-e2e/share/ha_codex_ui_uploads",
            "allowed_workspaces": ["/tmp/ha-codex-ui-e2e/share/ha_codex_ui_workspace", "/tmp/ha-codex-ui-e2e/share/ha_codex_ui_uploads"],
            "app_data_dir": "/tmp/ha-codex-ui-e2e/data/ha_codex_ui",
            "codex_home": "/tmp/ha-codex-ui-e2e/data/ha_codex_ui/.codex"
          }
          JSON
      - name: Start backend
        working-directory: ha_codex_ui/backend
        run: |
          HA_CODEX_UI_OPTIONS=/tmp/ha-codex-ui-e2e/options.json node dist/index.js > /tmp/ha-codex-ui-e2e/backend.log 2>&1 &
          echo $! > /tmp/ha-codex-ui-e2e/backend.pid
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:8107/api/health && exit 0
            sleep 1
          done
          cat /tmp/ha-codex-ui-e2e/backend.log
          exit 1
      - name: Run Playwright
        working-directory: ha_codex_ui/frontend
        run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-rendering-artifacts
          path: |
            ha_codex_ui/frontend/playwright-report
            ha_codex_ui/frontend/test-results
            /tmp/ha-codex-ui-e2e/backend.log
          if-no-files-found: ignore
