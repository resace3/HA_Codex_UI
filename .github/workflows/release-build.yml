name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Validate and test
        run: |
          python3 scripts/validate-addon-metadata.py
          bash scripts/check-name-collisions.sh
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/resace3/ha-config-pilot
      - name: Build and publish multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: config_pilot
          file: config_pilot/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/resace3/ha-config-pilot:latest
          format: sarif
          output: trivy-release-image.sarif
          version: v0.69.3
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-release-image.sarif
      - name: Release summary
        run: |
          echo "### Config Pilot release" >> "$GITHUB_STEP_SUMMARY"
          echo "Published GHCR image ghcr.io/resace3/ha-config-pilot when the release workflow succeeded." >> "$GITHUB_STEP_SUMMARY"
