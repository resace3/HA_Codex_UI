name: Lockfile Bootstrap

on:
  workflow_dispatch:
  push:
    paths:
      - config_pilot/backend/package.json
      - config_pilot/frontend/package.json

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: lockfile-bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockfiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Generate backend lockfile remotely
        working-directory: config_pilot/backend
        run: npm install --package-lock-only
      - name: Generate frontend lockfile remotely
        working-directory: config_pilot/frontend
        run: npm install --package-lock-only
      - name: Audit generated locks
        run: |
          (cd config_pilot/backend && npm audit --audit-level=high)
          (cd config_pilot/frontend && npm audit --audit-level=high)
      - uses: actions/upload-artifact@v4
        with:
          name: generated-package-locks
          path: |
            config_pilot/backend/package-lock.json
            config_pilot/frontend/package-lock.json
      - name: Create lockfile PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update generated package lockfiles"
          title: "Update Config Pilot package lockfiles"
          body: "Generated by GitHub Actions because local package manager execution is disabled for this project."
          branch: actions/update-lockfiles
