---
name: Security

on:
  workflow_call:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Custom secret and name scans
        run: |
          bash scripts/check-no-secrets.sh
          bash scripts/check-name-collisions.sh
      - name: Guarded scripts
        run: bash scripts/assert-github-actions-only.sh
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
      - name: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ha_codex_ui/Dockerfile
      - name: yamllint
        run: |
          python3 -m pip install yamllint
          yamllint .
      - name: markdownlint
        run: |
          npm install -g markdownlint-cli2
          mapfile -d '' -t md_files < <(find . -type f -name '*.md' -not -path '*/.git/*' -not -path '*/node_modules/*' -print0)
          if (( ${#md_files[@]} > 0 )); then
            markdownlint-cli2 "${md_files[@]}"
          fi
      - name: Backend npm audit
        working-directory: ha_codex_ui/backend
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high
      - name: Frontend npm audit
        working-directory: ha_codex_ui/frontend
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          version: v0.72.0
      - uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && hashFiles('trivy-fs.sarif') != '' }}
        continue-on-error: true
        with:
          sarif_file: trivy-fs.sarif
      - uses: actions/upload-artifact@v4
        if: ${{ always() && hashFiles('trivy-fs.sarif') != '' }}
        with:
          name: trivy-filesystem-sarif
          path: trivy-fs.sarif
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          output: codeql-results
          upload: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-results
          path: codeql-results
          if-no-files-found: ignore
