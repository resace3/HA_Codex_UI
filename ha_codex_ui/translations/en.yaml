---
configuration:
  default_workspace:
    name: Default workspace
    description: Initial workspace for file browsing, terminals, and Codex sessions.
  upload_workspace:
    name: Upload workspace
    description: Default writable folder for uploaded files.
  allowed_workspaces:
    name: Allowed workspaces
    description: Absolute workspace roots visible inside HA_Codex_UI.
  allow_config_write:
    name: Allow configuration writes
    description: Unsafe advanced option. The default keeps /config read-only.
  allow_shell:
    name: Allow shell terminals
    description: Enable browser-based shell terminals.
  allow_codex:
    name: Allow Codex sessions
    description: Enable Codex CLI terminal sessions.
  max_upload_mb:
    name: Maximum upload size
    description: Maximum upload size in MiB.
  max_terminal_sessions:
    name: Maximum terminal sessions
    description: Maximum live terminal sessions.
network:
  8107/tcp: HA_Codex_UI Ingress application
